global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'ingestion-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ingestion-service:8082']

  - job_name: 'patient-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['patient-service:8083']

  - job_name: 'audit-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['audit-service:8084']

  - job_name: 'auth-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['auth-service:8081']

  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'vulnerability-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['vulnerability-service:8085']
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'carestream_.*'
        action: keep

  - job_name: 'incident-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['incident-service:8086']
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'carestream_.*'
        action: keep

  - job_name: 'simulator-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['simulator-service:8089']
