version: '3.9'

networks:
  carestream-net:
    driver: bridge

volumes:
  postgres-data:
  kafka-data:
  redis-data:
  prometheus-data:
  grafana-data:

services:

  # ─── Infrastructure ───────────────────────────────────────

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: carestream-kafka
    networks: [carestream-net]
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: carestream-kafka-ui
    networks: [carestream-net]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: carestream
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  postgres:
    image: postgres:15-alpine
    container_name: carestream-postgres
    networks: [carestream-net]
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-carestream}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-carestream_secret}
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carestream"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: carestream-redis
    networks: [carestream-net]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Observability ────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: carestream-prometheus
    networks: [carestream-net]
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'

  grafana:
    image: grafana/grafana:latest
    container_name: carestream-grafana
    networks: [carestream-net]
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./docker/grafana/alerting:/etc/grafana/provisioning/alerting
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_ALERTING_ENABLED: "false"
      GF_UNIFIED_ALERTING_EXECUTE_ALERTS: "true"

  # ─── Microservices (uncomment as each phase builds them) ──

  ingestion-service:
    build:
      context: ./backend
      dockerfile: ingestion-service/Dockerfile
    container_name: carestream-ingestion
    networks: [carestream-net]
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  patient-service:
    build:
      context: ./backend
      dockerfile: patient-service/Dockerfile
    container_name: carestream-patient
    networks: [carestream-net]
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/patient_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-carestream}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-carestream_secret}
      SPRING_PROFILES_ACTIVE: docker

  audit-service:
    build:
      context: ./backend
      dockerfile: audit-service/Dockerfile
    container_name: carestream-audit
    networks: [carestream-net]
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8084:8084"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/audit_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-carestream}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-carestream_secret}
      SPRING_PROFILES_ACTIVE: docker

  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    container_name: carestream-auth
    networks: [carestream-net]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-carestream}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-carestream_secret}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_PROFILES_ACTIVE: docker

  vulnerability-service:
    build:
      context: ./backend
      dockerfile: vulnerability-service/Dockerfile
    container_name: carestream-vulnerability
    networks: [carestream-net]
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8085:8085"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/security_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-carestream}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-carestream_secret}
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/api/v1/vulnerabilities/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  incident-service:
    build:
      context: ./backend
      dockerfile: incident-service/Dockerfile
    container_name: carestream-incident
    networks: [carestream-net]
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8086:8086"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/security_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-carestream}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-carestream_secret}
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/api/v1/incidents/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    container_name: carestream-gateway
    networks: [carestream-net]
    depends_on:
      - ingestion-service
      - patient-service
      - audit-service
      - auth-service
      - vulnerability-service
      - incident-service
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker

  # ─── Real-Time Event Simulator ───────────────────────────────────────────

  simulator-service:
    build:
      context: ./backend
      dockerfile: simulator-service/Dockerfile
    container_name: carestream-simulator
    networks: [carestream-net]
    depends_on:
      kafka:
        condition: service_healthy
      vulnerability-service:
        condition: service_healthy
      incident-service:
        condition: service_healthy
    ports:
      - "8089:8089"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_PROFILES_ACTIVE: docker
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8089/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Frontend Dashboard ────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: carestream-frontend
    networks: [carestream-net]
    depends_on:
      - api-gateway
    ports:
      - "3001:80"
    restart: unless-stopped
