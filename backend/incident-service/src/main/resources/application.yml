server:
  port: 8086

spring:
  application:
    name: incident-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/security_db}
    username: ${SPRING_DATASOURCE_USERNAME:carestream}
    password: ${SPRING_DATASOURCE_PASSWORD:carestream_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: incident-service-group
      auto-offset-reset: earliest
      enable-auto-commit: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3

kafka:
  topics:
    security-alerts: security.alerts
    incident-events: incident.events

metrics:
  refresh:
    interval-ms: ${METRICS_REFRESH_INTERVAL_MS:120000}   # 2 minutes

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      service: incident-service

logging:
  level:
    com.carestream: DEBUG
    org.apache.kafka: WARN

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/security_db
  kafka:
    bootstrap-servers: kafka:29092
